name: CI (implementation branch)

# Mirror of the main CI workflow so the implementation branch gets the same
# build & test gating before its work is merged back into main.
on:
  push:
    branches: [claude/ci-workflow-implementation-copy-8zs1kv]
  pull_request:
    branches: [claude/ci-workflow-implementation-copy-8zs1kv]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ShortLynx.slnx

      # Tests use in-memory SQLite, so no database service is required.
      # The Tailwind build step is skipped on CI (no binary present) and falls
      # back to the committed wwwroot/css/tailwind.css — a warning, not an error.
      - name: Build
        run: dotnet build ShortLynx.slnx --no-restore -c Release

      - name: Test
        run: dotnet test ShortLynx.slnx --no-build -c Release --verbosity normal
