name: CI

# Run the full test suite on main so bugs are caught before they reach production.
# Pull requests targeting main are gated on the same checks.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ShortLynx.slnx

      # Tests use in-memory SQLite, so no database service is required.
      # The Tailwind build step is skipped on CI (no binary present) and falls
      # back to the committed wwwroot/css/tailwind.css — the `tailwind` job below
      # guards against that committed file going stale.
      - name: Build
        run: dotnet build ShortLynx.slnx --no-restore -c Release

      - name: Test
        run: dotnet test ShortLynx.slnx --no-build -c Release --verbosity normal

  # The Admin build only regenerates wwwroot/css/tailwind.css when the standalone
  # CLI is present locally; otherwise it warns and ships the committed copy. That
  # let an analytics UI merge deploy with stale CSS (missing utility classes →
  # unstyled buttons + a chart with no bars). This job regenerates the CSS the
  # same way and fails if the committed file doesn't match, so it can't drift again.
  tailwind:
    name: Tailwind CSS up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to the version the committed CSS was generated with so formatting
      # matches exactly (a newer CLI could reformat output and cause false diffs).
      - name: Download Tailwind standalone CLI
        run: |
          mkdir -p ShortLynx.Admin/tools
          curl -sSL -o ShortLynx.Admin/tools/tailwindcss \
            https://github.com/tailwindlabs/tailwindcss/releases/download/v4.3.2/tailwindcss-linux-x64
          chmod +x ShortLynx.Admin/tools/tailwindcss

      - name: Regenerate CSS from current markup
        working-directory: ShortLynx.Admin
        run: ./tools/tailwindcss -i Styles/app.tailwind.css -o wwwroot/css/tailwind.css

      - name: Fail if committed tailwind.css is stale
        run: |
          if ! git diff --quiet -- ShortLynx.Admin/wwwroot/css/tailwind.css; then
            echo "::error::ShortLynx.Admin/wwwroot/css/tailwind.css is out of date. Regenerate it with the Tailwind CLI and commit the result."
            git diff --stat -- ShortLynx.Admin/wwwroot/css/tailwind.css
            exit 1
          fi
          echo "tailwind.css is up to date."
